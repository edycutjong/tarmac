name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ── STAGE 1: Code Quality (parallel with Stage 2) ─────────
  quality:
    name: "Stage 1 · Quality"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Full matrix on main push, single version on PRs (saves CI minutes)
        python-version: ${{ github.event_name == 'push' && fromJSON('["3.12", "3.13"]') || fromJSON('["3.12"]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy src
        continue-on-error: true # pre-existing structural-typing gaps, tracked not blocking

      - name: Unit tests with coverage
        run: pytest --cov=tarmac_society --cov-report=xml --cov-report=term

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # ── STAGE 2: Security Gate (parallel with Stage 1) ────────
  secret-scan:
    name: "Stage 2 · Secret Scanning"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Full history for scanning git commits
      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  dependency-audit:
    name: "Stage 2 · Dependency Audit"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: pip-audit
        run: |
          pip install pip-audit
          pip install -e .
          pip-audit
        continue-on-error: true # Advisory — don't block on unpatched upstream

  # ── STAGE 3: Build / Package Verification ─────────────────
  build:
    name: "Stage 3 · Build Verification"
    needs: [quality]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build
      - name: Install package from wheel + smoke-test CLI
        run: |
          pip install dist/*.whl
          tarmac --help

  # ── STAGE 4: Offline Verification (zero-key judge path) ───
  offline-verify:
    name: "Stage 4 · Offline Verification"
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Deterministic society run + invariant replay
        run: python scripts/verify_offline.py

  # ── STAGE 5: Deploy Gate (main only) ──────────────────────
  deploy-gate:
    name: "Stage 5 · Deploy Gate"
    needs: [build, offline-verify, secret-scan, dependency-audit]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: All gates passed
        run: |
          echo "All CI/CD gates passed!"
          echo ""
          echo "Pipeline Summary:"
          echo "  - Stage 1 - Quality (ruff, mypy, pytest --cov)"
          echo "  - Stage 2 - Secret Scanning (TruffleHog)"
          echo "  - Stage 2 - Dependency Audit (pip-audit)"
          echo "  - Stage 3 - Build Verification (sdist/wheel + CLI smoke test)"
          echo "  - Stage 4 - Offline Verification (deterministic replay, zero keys)"
# ── STAGE 6: Semantic Release (main only) ─────────────────
  release:
    name: "Stage 6 · Semantic Release"
    needs: [deploy-gate]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write # push the auto-computed version commit + tag
    steps:
      - name: Checkout (full history for commit analysis)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install release tooling
        run: pip install -e ".[release]"
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Semantic version → bump + tag + push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: semantic-release version
