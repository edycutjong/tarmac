<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img" aria-label="Tarmac — five rival agents renegotiate a cancelled flight, measurably better than one">
  <defs>
    <radialGradient id="tbgA" cx="72%" cy="14%" r="55%">
      <stop offset="0" stop-color="#FBBF24" stop-opacity=".13"/><stop offset="1" stop-color="#FBBF24" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tbgB" cx="8%" cy="92%" r="50%">
      <stop offset="0" stop-color="#34D399" stop-opacity=".08"/><stop offset="1" stop-color="#34D399" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tbrand" gradientUnits="userSpaceOnUse" x1="60" y1="0" x2="960" y2="0">
      <stop offset="0" stop-color="#F4F1E8"/><stop offset=".55" stop-color="#FBBF24"/><stop offset="1" stop-color="#34D399"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-260 0;260 0;-260 0" dur="7s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="tblur14" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="14"/></filter>
    <filter id="tblur3"><feGaussianBlur stdDeviation="3"/></filter>
    <pattern id="tgrid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#F4F1E8" stroke-opacity=".05" stroke-width="1"/>
    </pattern>
    <style>
      .disp { font-family: -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
      .mono { font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace; }
    </style>
  </defs>

  <rect width="1280" height="640" fill="#0A0E14"/>
  <rect width="1280" height="640" fill="url(#tbgA)"><animate attributeName="opacity" values=".7;1;.7" dur="5s" repeatCount="indefinite"/></rect>
  <rect width="1280" height="640" fill="url(#tbgB)"/>
  <g><rect x="-48" y="-48" width="1376" height="736" fill="url(#tgrid)"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="48 48" dur="5s" repeatCount="indefinite"/></g>

  <!-- flight path + plane -->
  <path id="flightpath" d="M-60 150 C 300 60 640 210 900 130 C 1080 78 1220 96 1360 60" fill="none" stroke="#FBBF24" stroke-opacity=".22" stroke-width="2" stroke-dasharray="2 10"/>
  <g>
    <path d="M0 -9 L18 9 L7 6 L0 12 L-7 6 L-18 9 Z" fill="#FBBF24" filter="url(#tblur3)" opacity=".7" transform="rotate(90)"/>
    <animateMotion dur="9s" repeatCount="indefinite" rotate="auto"><mpath href="#flightpath"/></animateMotion>
  </g>

  <!-- DEPARTURE BOARD: DELAYED flips to REBOOKED -->
  <g>
    <rect x="620" y="96" width="596" height="168" rx="14" fill="#141A24" stroke="#F4F1E8" stroke-opacity=".1"/>
    <text x="636" y="86" class="mono" font-size="13" letter-spacing="2" fill="#98A1AE">DEPARTURES · STORM CELL DFW</text>
    <g class="mono" font-size="15">
      <text x="644" y="132" fill="#F4F1E8">QW441 · DEN</text>
      <rect x="1040" y="114" width="160" height="28" rx="6" fill="#F87171" opacity=".9">
        <animate attributeName="opacity" values=".9;.9;0;0;.9" keyTimes="0;.42;.5;.92;1" dur="8s" repeatCount="indefinite"/></rect>
      <rect x="1040" y="114" width="160" height="28" rx="6" fill="#34D399" opacity="0">
        <animate attributeName="opacity" values="0;0;.95;.95;0" keyTimes="0;.42;.5;.92;1" dur="8s" repeatCount="indefinite"/></rect>
      <text x="1120" y="133" fill="#0A0E14" text-anchor="middle" font-weight="700">
        REBOOKED<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;.42;.5;.92;1" dur="8s" repeatCount="indefinite"/></text>
      <text x="1120" y="133" fill="#0A0E14" text-anchor="middle" font-weight="700" opacity=".95">
        DEADLOCK<animate attributeName="opacity" values=".95;.95;0;0;.95" keyTimes="0;.42;.5;.92;1" dur="8s" repeatCount="indefinite"/></text>

      <text x="644" y="176" fill="#F4F1E8">UM-07 + MED-02</text>
      <rect x="1040" y="158" width="160" height="28" rx="6" fill="#FBBF24" opacity=".9">
        <animate attributeName="opacity" values=".9;.9;0;0;.9" keyTimes="0;.3;.38;.92;1" dur="8s" repeatCount="indefinite"/></rect>
      <rect x="1040" y="158" width="160" height="28" rx="6" fill="#34D399" opacity="0">
        <animate attributeName="opacity" values="0;0;.95;.95;0" keyTimes="0;.3;.38;.92;1" dur="8s" repeatCount="indefinite"/></rect>
      <text x="1120" y="177" fill="#0A0E14" text-anchor="middle" font-weight="700">SEATED ✓<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;.3;.38;.92;1" dur="8s" repeatCount="indefinite"/></text>
      <text x="1120" y="177" fill="#0A0E14" text-anchor="middle" font-weight="700" opacity=".95">CLAIMED<animate attributeName="opacity" values=".95;.95;0;0;.95" keyTimes="0;.3;.38;.92;1" dur="8s" repeatCount="indefinite"/></text>

      <text x="644" y="220" fill="#F4F1E8">CREW B · FERRY 21:10</text>
      <rect x="1040" y="202" width="160" height="28" rx="6" fill="#141A24" stroke="#F87171"/>
      <text x="1120" y="221" fill="#F87171" text-anchor="middle" font-weight="700">FAR VETO</text>
    </g>
    <text x="644" y="250" class="mono" font-size="13" fill="#98A1AE">ruling d-04 · ed25519 ✓ · cites duty-table FO-2
      <animate attributeName="opacity" values=".4;1;.4" dur="2.4s" repeatCount="indefinite"/></text>
  </g>

  <!-- kicker -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur=".6s" begin=".1s" fill="freeze"/>
    <text x="64" y="92" class="mono" font-size="15" letter-spacing="4" fill="#34D399">QWEN CLOUD // TRACK 3 · AGENT SOCIETY</text>
  </g>

  <!-- title -->
  <g opacity="0" transform="translate(0 26)">
    <animate attributeName="opacity" from="0" to="1" dur=".9s" begin=".25s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" values="0 26;0 0" dur=".9s" begin=".25s" fill="freeze" calcMode="spline" keySplines=".22 1 .36 1" keyTimes="0;1"/>
    <text x="58" y="212" class="disp" font-size="130" font-weight="800" letter-spacing="-3" fill="#FBBF24" filter="url(#tblur14)" opacity=".5">Tarmac<animate attributeName="opacity" values=".3;.65;.3" dur="3.4s" repeatCount="indefinite"/></text>
    <text x="58" y="212" class="disp" font-size="130" font-weight="800" letter-spacing="-3" fill="url(#tbrand)">Tarmac</text>
  </g>

  <!-- tagline -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur=".8s" begin=".55s" fill="freeze"/>
    <text x="64" y="262" class="disp" font-size="24" fill="#98A1AE">Five rival agents renegotiate a cancelled flight —</text>
    <text x="64" y="296" class="disp" font-size="24" fill="#98A1AE"><tspan fill="#F4F1E8" font-weight="600">measurably better</tspan> than one planner. Benchmarked.</text>
  </g>

  <!-- metric -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur=".8s" begin=".85s" fill="freeze"/>
    <text x="62" y="386" class="disp" font-size="72" font-weight="800" fill="#FBBF24" filter="url(#tblur3)" opacity=".55">3 <tspan font-size="44">vs</tspan> 17<animate attributeName="opacity" values=".35;.75;.35" dur="2.6s" repeatCount="indefinite"/></text>
    <text x="62" y="386" class="disp" font-size="72" font-weight="800" fill="#F4F1E8">3 <tspan fill="#98A1AE" font-size="44">vs</tspan> 17</text>
    <text x="392" y="360" class="mono" font-size="16" fill="#98A1AE">protected pax stranded · 0 crew violations</text>
    <text x="392" y="384" class="mono" font-size="16" fill="#34D399">100% vs 0% SLA met</text>
  </g>

  <!-- features -->
  <g class="disp" font-size="18" fill="#F4F1E8" opacity="0"><animate attributeName="opacity" from="0" to="1" dur=".8s" begin="1.1s" fill="freeze"/>
    <text x="64" y="446"><tspan fill="#FBBF24">◆</tspan>  Sealed-bid claims on a row-locked seat ledger</text>
    <text x="64" y="480"><tspan fill="#FBBF24">◆</tspan>  Mediator rulings — Ed25519-signed, regulation-cited</text>
    <text x="64" y="514"><tspan fill="#FBBF24">◆</tspan>  Single-vs-society ablation, 10 seeds, reproducible</text>
  </g>

  <!-- society diagram -->
  <g>
    <path d="M632 400 H1216" stroke="#FBBF24" stroke-opacity=".28" stroke-width="2" stroke-dasharray="8 7" fill="none">
      <animate attributeName="stroke-dashoffset" values="0;-30" dur="1.1s" repeatCount="indefinite"/>
    </path>
    <circle r="5" fill="#FBBF24" filter="url(#tblur3)"><animateMotion dur="2.6s" repeatCount="indefinite" path="M632 400 H1216"/></circle>
    <g class="mono" font-size="14" text-anchor="middle">
      <rect x="620" y="374" width="102" height="52" rx="12" fill="#141A24" stroke="#FBBF24" stroke-opacity=".6"/>
      <text x="671" y="405" fill="#FBBF24">STORM</text>
      <rect x="744" y="374" width="132" height="52" rx="12" fill="#141A24" stroke="#F4F1E8" stroke-opacity=".22"/>
      <text x="810" y="405" fill="#F4F1E8">5 AGENTS</text>
      <rect x="898" y="374" width="150" height="52" rx="12" fill="#141A24" stroke="#FBBF24" stroke-opacity=".8"><animate attributeName="stroke-opacity" values=".5;1;.5" dur="2s" repeatCount="indefinite"/></rect>
      <text x="973" y="405" fill="#FBBF24">MEDIATOR ⚖</text>
      <rect x="1072" y="374" width="144" height="52" rx="12" fill="#141A24" stroke="#34D399"/>
      <text x="1144" y="405" fill="#34D399">GREEN BOARD</text>
    </g>
    <g class="mono" font-size="13">
      <rect x="964" y="330" width="252" height="30" rx="15" fill="none" stroke="#98A1AE" stroke-opacity=".4" stroke-dasharray="5 5"/>
      <circle cx="984" cy="345" r="4" fill="#34D399"><animate attributeName="opacity" values="1;.3;1" dur="1.6s" repeatCount="indefinite"/></circle>
      <text x="1000" y="350" fill="#98A1AE">claim ledger · deadlock detect</text>
    </g>
  </g>

  <!-- pills -->
  <g class="mono" font-size="13" opacity="0"><animate attributeName="opacity" from="0" to="1" dur=".8s" begin="1.35s" fill="freeze"/>
    <rect x="64" y="574" width="133" height="30" rx="15" fill="#141A24" stroke="#F4F1E8" stroke-opacity=".14"/><circle cx="82" cy="589" r="3.5" fill="#FBBF24"/><text x="94" y="594" fill="#98A1AE">qwen3.7-max</text>
    <rect x="209" y="574" width="141" height="30" rx="15" fill="#141A24" stroke="#F4F1E8" stroke-opacity=".14"/><circle cx="227" cy="589" r="3.5" fill="#FBBF24"/><text x="239" y="594" fill="#98A1AE">qwen3.7-plus</text>
    <rect x="362" y="574" width="149" height="30" rx="15" fill="#141A24" stroke="#F4F1E8" stroke-opacity=".14"/><circle cx="380" cy="589" r="3.5" fill="#FBBF24"/><text x="392" y="594" fill="#98A1AE">context cache</text>
    <rect x="523" y="574" width="117" height="30" rx="15" fill="#141A24" stroke="#F4F1E8" stroke-opacity=".14"/><circle cx="541" cy="589" r="3.5" fill="#FBBF24"/><text x="553" y="594" fill="#98A1AE">Batch API</text>
    <rect x="652" y="574" width="133" height="30" rx="15" fill="#141A24" stroke="#F4F1E8" stroke-opacity=".14"/><circle cx="670" cy="589" r="3.5" fill="#FBBF24"/><text x="682" y="594" fill="#98A1AE">Alibaba FC</text>
    <rect x="797" y="574" width="109" height="30" rx="15" fill="#141A24" stroke="#F4F1E8" stroke-opacity=".14"/><circle cx="815" cy="589" r="3.5" fill="#FBBF24"/><text x="827" y="594" fill="#98A1AE">Supabase</text>
    <g text-anchor="end"><text x="1216" y="594" fill="#98A1AE" opacity=".8">ONE STORM · 6 ROUNDS · QUIESCENT</text></g>
  </g>

  <!-- sweep -->
  <rect x="-160" y="0" width="120" height="640" fill="#F4F1E8" opacity=".04" transform="skewX(-12)">
    <animate attributeName="x" values="-200;1400" dur="6s" repeatCount="indefinite"/>
  </rect>
</svg>
